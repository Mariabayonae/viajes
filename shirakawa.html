<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shirakawa-go</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>


.plane{
  position:fixed;
  top:0;
  left:0;
  font-size:24px;
  pointer-events:none;
  transform:translate(-50%, -50%);
  z-index:9999;
}


.back{
  position:absolute;
  top:15px;
  left:15px;
  background:rgba(0,0,0,0.45);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  z-index:10;
}


.intro{
  max-width:800px;
  margin:25px auto 10px;
  padding:18px;
  background:rgba(255,255,255,0.88);
  border-radius:14px;
  text-align:center;
  color:#333;
  line-height:1.6;
}


.tabs{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:20px auto;
}

.tab{
  padding:10px 18px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  background:rgba(255,255,255,0.25);
  border:1px solid rgba(0,0,0,0.1);
  backdrop-filter:blur(8px);
  font-weight:600;
}

.tab.active{
  background:#5a3a2b;
  color:white;
}

/* CARD */
.card{
  max-width:800px;
  margin:20px auto;
  padding:22px;
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(90,58,43,0.35);
  border-radius:18px;
  backdrop-filter:blur(12px);
  line-height:1.6;
}


.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  max-width:900px;
  margin:35px auto 20px;
}

.gallery img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:14px;
}

/* VIDEO ABAJO */
.video-bottom{
  width:100%;
  max-width:900px;
  margin:40px auto 60px;
  display:block;
  border-radius:16px;
}


.bg-shirakawa{
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(120, 85, 60, 0.25), transparent 55%),
    radial-gradient(circle at 80% 60%, rgba(160, 120, 90, 0.18), transparent 60%),
    linear-gradient(180deg, #f3e7db, #ffffff);
}

</style>

</head>

<body>

<div class="plane">✈️</div>
<div class="bg-shirakawa"></div>

<a class="back" href="index.html">← Volver</a>

<div class="title">
  <h1>SHIRAKAWA-GO</h1>
</div>


<div class="gallery">
  <img src="fotos/shirakawa3.jpg">
  <img src="fotos/shirakawamedio.jpg">
  <img src="fotos/shirakawa2.jpg">
</div>


<div class="intro">
Shirakawa-go es un pueblo tradicional japonés famoso por sus casas de techo de paja diseñadas para resistir fuertes nevadas.
</div>


<div class="tabs">

  <button class="tab active" onclick="setInfo('epoca', this)">Mejor época</button>
  <button class="tab" onclick="setInfo('ropa', this)">Qué llevar</button>
  <button class="tab" onclick="setInfo('imperdibles', this)">Imperdibles</button>
  <button class="tab" onclick="setInfo('precios', this)">Precios</button>

</div>


<div class="card" id="info">
Explora Shirakawa-go usando los botones.
</div>


<video class="video-bottom" autoplay muted loop playsinline>
  <source src="video/shirakawa.mp4">
</video>

<script src="scripts/shirakawa.js" defer></script>
</body>
</html>
